<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Azelia – Task Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 500px;
      padding: 40px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 span {
      color: #667eea;
    }

    .subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 28px;
      font-weight: 500;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #f0f0f0;
      border-radius: 14px;
      font-size: 15px;
      background: #f8f9fa;
      outline: none;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .input-row input:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.15);
    }

    .input-row input::placeholder {
      color: #ccc;
    }

    .btn-add {
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-add:active {
      transform: translateY(0);
    }

    /* Task list */
    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
      max-height: 400px;
      overflow-y: auto;
    }

    .task-list::-webkit-scrollbar {
      width: 6px;
    }

    .task-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: #ddd;
      border-radius: 3px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f8f9fa;
      border-radius: 12px;
      transition: all 0.3s ease;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .task-item:hover {
      background: #f0f0f0;
      transform: translateX(4px);
    }

    .task-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      transition: all 0.3s ease;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #ccc;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      background: rgba(231, 76, 60, 0.1);
      transform: scale(1.15);
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #ccc;
      font-size: 15px;
      animation: fadeIn 0.3s ease-out;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #f0f0f0, transparent);
      margin: 24px 0;
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: linear-gradient(135deg, #f8f9fa, #f0f0f0);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      transition: all 0.3s ease;
      border: 1px solid #f0f0f0;
    }

    .stat-box:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      background: linear-gradient(135deg, #ffffff, #f8f9fa);
    }

    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .stat-box:nth-child(1) .stat-number {
      color: #667eea;
    }

    .stat-box:nth-child(2) .stat-number {
      color: #27ae60;
    }

    .stat-box:nth-child(3) .stat-number {
      color: #f39c12;
    }

    .stat-label {
      font-size: 12px;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="card">

    <h1>Azelia<span>.</span></h1>
    <p class="subtitle">Simple Task Manager</p>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task…" />
      <button class="btn-add" onclick="addTask()">Add</button>
    </div>

    <ul class="task-list" id="taskList"></ul>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statDone">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="statPending">0</div>
        <div class="stat-label">Pending</div>
      </div>
    </div>

  </div>

  <script>

    let tasks = [];
    let nextId = 1;

    // Add task when Enter is pressed
    document.getElementById('taskInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTask();
    });

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (text === '') return;

      tasks.push({ id: nextId, text: text, done: false });
      nextId++;
      input.value = '';
      render();
    }

    function toggleTask(id) {
      for (let i = 0; i < tasks.length; i++) { // Find matching task by id
        if (tasks[i].id === id) {
          tasks[i].done = !tasks[i].done; // Toggle completed state
        }
      }
      render(); // Repaint list and stats
    }

    function deleteTask(id) {
      tasks = tasks.filter(function(t) { return t.id !== id; }); // Remove task by id
      render(); // Repaint list and stats
    }

    function render() {
      const list = document.getElementById('taskList'); // Target list container
      list.innerHTML = ''; // Clear existing items

      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty">No tasks yet. Add one above!</div>'; // Empty state
      } else {
        for (let i = 0; i < tasks.length; i++) { // Build each task row
          const task = tasks[i]; // Current task
          const li = document.createElement('li'); // Create list item
          li.className = task.done ? 'task-item done' : 'task-item'; // Done styling
          li.innerHTML =
            '<input type="checkbox" ' + (task.done ? 'checked' : '') + ' onchange="toggleTask(' + task.id + ')">' +
            '<span class="task-text">' + task.text + '</span>' +
            '<button class="btn-delete" onclick="deleteTask(' + task.id + ')">✕</button>'; // Delete action
          list.appendChild(li); // Add to DOM
        }
      }

      // Update stats
      let done = 0;
      for (let i = 0; i < tasks.length; i++) {
        if (tasks[i].done) done++;
      }
      document.getElementById('statTotal').textContent = tasks.length;
      document.getElementById('statDone').textContent = done;
      document.getElementById('statPending').textContent = tasks.length - done;
    }

    render();

  </script>

</body>
</html>
